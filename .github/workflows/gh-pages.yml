name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      # 1. Instala o pnpm primeiro para o setup-node conseguir usar o cache
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      # 2. Configura o Node.js e ativa o cache do pnpm com segurança
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      # 3. Instala as dependências usando o pnpm de forma limpa
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create 404 for SPA fallback
        run: cp ./dist/public/index.html ./dist/public/404.html || true

      - name: Diagnose build output
        run: |
          echo "-- listing client/dist/public --"
          ls -la ./client/dist/public || true
          echo "-- head of index.html --"
          head -n 40 ./client/dist/public/index.html || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./client/dist/public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
