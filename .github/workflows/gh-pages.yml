name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

# Para sumir com o aviso:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - uses: actions/checkout@v4

      # 1. Instala e gerencia o pnpm (ele mesmo cuidará do cache nativamente)
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      # 2. Configura o Node.js de forma limpa (sem o cache conflitante do pnpm)
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # 3. Instala as dependências na raiz (o `vite.config.ts` define `root: client`)
      - name: Install dependencies
        run: pnpm install

      # 4. Executa o build (Vite usa `root: client` e escreve em `dist/public` no repo root)
      - name: Build project
        run: pnpm build

      # 5. Cria o fallback de 404 para rotas React (SPA) funcionarem no GitHub Pages
      - name: Create 404 for SPA fallback
        run: cp ./dist/public/index.html ./dist/public/404.html || true

      # 6. Diagnose (Opcional, mas bom para checar os logs se precisar)
      - name: Diagnose build output
        run: |
          echo "=== Onde estou no terminal ==="
          pwd
          echo "=== Listando repo root --"
          ls -la . || true
          echo "=== Listando dist/public --"
          ls -la ./dist/public || true
          echo "=== Listando client/dist/public --"
          ls -la ./client/dist/public || true

      # 7. Configura as páginas do GitHub
      - name: Configure Pages
        uses: actions/configure-pages@v5

      # 8. FAZ O UPLOAD (Agora que todos os arquivos, incluindo o 404.html, estão prontos)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/public

      # 9. Realiza o deploy final em produção
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
